services:
  cm-grasshopper:
    container_name: cm-grasshopper
    restart: always
    image: cloudbaristaorg/cm-grasshopper:edge
    depends_on:
      cm-grasshopper-rustfs:
        condition: service_healthy
    volumes:
      #- ./cm-grasshopper.db:/root/.cm-grasshopper/cm-grasshopper.db:rw
      #- ./honeybee.key:/root/.cm-grasshopper/honeybee.key:ro
      #- ./playbook:/playbook/:rw
      - ./software_temp:/software_temp:rw
      - ./software_log:/software_log:rw
      - ./k8s_job_log:/k8s_job_log:rw
    network_mode: "host"

  cm-grasshopper-rustfs:
    image: rustfs/rustfs:latest
    container_name: cm-grasshopper-rustfs
    restart: always
    user: "0:0"
    ports:
      - "19000:9000"
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=:9000
    volumes:
      - ./rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://127.0.0.1:9000/"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 30
