  <path d="M370,102 L370,116" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#k8)"/>
  <path d="M370,162 L370,176" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#k8)"/>
  <path d="M370,222 L370,236" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#k8)"/>

  <text x="370" y="320" text-anchor="middle" font-size="11.5" fill="#64748b">클러스터 리소스를 객체 스토리지 경유로 백업·복원 (구현 진행 중)</text>
