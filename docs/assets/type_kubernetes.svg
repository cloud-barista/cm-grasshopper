<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 400" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="k8" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="740" height="400" fill="#ffffff"/>

  <!-- design badge -->
  <rect x="560" y="16" width="160" height="26" rx="13" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.3"/>
  <text x="640" y="34" text-anchor="middle" font-size="11.5" font-weight="700" fill="#854d0e">설계 단계</text>

  <rect x="120" y="56" width="500" height="46" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="370" y="84" text-anchor="middle" font-size="12.5" fill="#312e81">① 타깃 클러스터에 Velero 설치</text>

