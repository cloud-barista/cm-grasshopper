  <rect x="120" y="176" width="500" height="46" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="370" y="204" text-anchor="middle" font-size="12.5" fill="#312e81">③ velero backup — 소스 네임스페이스/리소스 백업</text>

