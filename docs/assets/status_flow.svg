<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="st" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="360" fill="#ffffff"/>

  <!-- item level -->
  <text x="40" y="44" font-size="13" font-weight="700" fill="#334155">항목(SW) 단위 상태</text>

  <rect x="40" y="58" width="120" height="44" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="85" text-anchor="middle" font-size="12.5" fill="#334155">ready</text>

  <rect x="240" y="58" width="130" height="44" rx="9" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="305" y="85" text-anchor="middle" font-size="12.5" fill="#854d0e">installing</text>

  <rect x="470" y="22" width="140" height="44" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.7"/>
  <text x="540" y="49" text-anchor="middle" font-size="12.5" font-weight="700" fill="#15803d">finished</text>

  <rect x="470" y="94" width="140" height="44" rx="9" fill="#fee2e2" stroke="#dc2626" stroke-width="1.7"/>
  <text x="540" y="121" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">failed</text>

  <path d="M160,80 L238,80" stroke="#64748b" stroke-width="1.5" marker-end="url(#st)"/>
  <path d="M370,72 L468,50" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#st)"/>
  <path d="M370,90 L468,114" fill="none" stroke="#dc2626" stroke-width="1.5" marker-end="url(#st)"/>
  <text x="624" y="49" font-size="11" fill="#15803d">각 단계 정상 + 검증 통과</text>
  <text x="624" y="120" font-size="11" fill="#b91c1c">단계 오류 / 검증 실패</text>

  <line x1="40" y1="170" x2="860" y2="170" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- execution level -->
  <text x="40" y="208" font-size="13" font-weight="700" fill="#334155">실행(Target) 단위 상태</text>

  <rect x="40" y="222" width="130" height="44" rx="9" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="105" y="249" text-anchor="middle" font-size="12.5" fill="#854d0e">running</text>

  <rect x="300" y="200" width="150" height="40" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="375" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">finished</text>

  <rect x="300" y="250" width="190" height="40" rx="9" fill="#ffedd5" stroke="#ea580c" stroke-width="1.6"/>
  <text x="395" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">finished with error</text>

  <rect x="300" y="300" width="150" height="40" rx="9" fill="#fee2e2" stroke="#dc2626" stroke-width="1.6"/>
  <text x="375" y="325" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">failed</text>

  <path d="M170,240 L298,220" fill="none" stroke="#16a34a" stroke-width="1.4" marker-end="url(#st)"/>
  <path d="M170,246 L298,270" fill="none" stroke="#ea580c" stroke-width="1.4" marker-end="url(#st)"/>
  <path d="M170,256 L298,320" fill="none" stroke="#dc2626" stroke-width="1.4" marker-end="url(#st)"/>

  <text x="512" y="225" font-size="11" fill="#15803d">모든 항목 finished</text>
  <text x="512" y="275" font-size="11" fill="#9a3412">일부 항목 failed (나머지는 계속 진행)</text>
  <text x="512" y="325" font-size="11" fill="#b91c1c">초기 치명 오류 (OS 불일치·연결·로거 등)</text>
</svg>
