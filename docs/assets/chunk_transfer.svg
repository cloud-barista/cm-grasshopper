<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ch" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="420" fill="#ffffff"/>

  <rect x="60" y="30" width="760" height="50" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
  <text x="78" y="50" font-size="11.5" font-weight="700" fill="#15803d">① Source</text>
  <text x="440" y="60" text-anchor="middle" font-size="12.5" fill="#14532d">tar --numeric-owner -czf - | split -b 5M  →  chunk_00 … chunk_NN  (+ 청크 수 검증)</text>

  <rect x="60" y="108" width="760" height="56" rx="9" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="78" y="128" font-size="11.5" font-weight="700" fill="#475569">② 전송</text>
  <text x="440" y="132" text-anchor="middle" font-size="12.5" fill="#334155">청크별: cat → base64 인코딩(Go) → echo | base64 -d (≤100KB 조각) 으로 기록</text>
  <text x="440" y="152" text-anchor="middle" font-size="11.5" fill="#64748b">→ 청크 크기 검증 (source = target)</text>

  <rect x="60" y="192" width="760" height="50" rx="9" fill="#ecfeff" stroke="#0891b2" stroke-width="1.6"/>
  <text x="78" y="212" font-size="11.5" font-weight="700" fill="#0e7490">③ Target</text>
  <text x="440" y="222" text-anchor="middle" font-size="12.5" fill="#0c4a6e">cat chunk_* | tar --numeric-owner -xzf -  →  동일 경로로 원본 복원</text>

  <rect x="60" y="270" width="760" height="44" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="440" y="297" text-anchor="middle" font-size="12" fill="#334155">④ Source · Target 임시 디렉토리 정리</text>

  <path d="M440,80 L440,108" stroke="#64748b" stroke-width="1.5" marker-end="url(#ch)"/>
  <path d="M440,164 L440,192" stroke="#64748b" stroke-width="1.5" marker-end="url(#ch)"/>
  <path d="M440,242 L440,270" stroke="#64748b" stroke-width="1.5" marker-end="url(#ch)"/>

  <rect x="60" y="338" width="760" height="56" rx="9" fill="#fff7ed" stroke="#fb923c" stroke-width="1.3"/>
  <text x="78" y="360" font-size="11.5" font-weight="700" fill="#9a3412">왜 이렇게?</text>
  <text x="440" y="360" text-anchor="middle" font-size="11.5" fill="#9a3412">SSH 명령 채널만으로 전송(SFTP/SCP 불필요) · tar 로 권한·UID/GID(numeric) 보존</text>
  <text x="440" y="380" text-anchor="middle" font-size="11.5" fill="#9a3412">5MB 청크 + ≤100KB 조각 → 명령 길이 한계 회피 · 청크 단위 검증으로 안정성 확보</text>
</svg>
