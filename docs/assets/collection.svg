<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="cl" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="470" fill="#ffffff"/>

  <!-- source host -->
  <rect x="20" y="30" width="430" height="412" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="40" y="55" font-size="13" font-weight="700" fill="#334155">Source 서버 · honeybee-agent (수집)</text>

  <!-- collectors -->
  <rect x="40" y="70" width="300" height="56" rx="9" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="56" y="92" font-size="12" font-weight="600" fill="#0f766e">패키지 DB</text>
  <text x="56" y="112" font-size="11" fill="#134e4a">dpkg /var/lib/dpkg/status · rpm DB</text>

  <rect x="40" y="150" width="300" height="56" rx="9" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="56" y="172" font-size="12" font-weight="600" fill="#0e7490">컨테이너 런타임 API</text>
  <text x="56" y="192" font-size="11" fill="#0c4a6e">Docker / Podman: list · inspect · image</text>

  <rect x="40" y="230" width="300" height="56" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="56" y="252" font-size="12" font-weight="600" fill="#15803d">프로세스 스캔</text>
  <text x="56" y="272" font-size="11" fill="#14532d">/proc · ELF · cgroup · 열린 FD</text>

  <rect x="40" y="310" width="300" height="56" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.3" stroke-dasharray="5,4"/>
  <text x="56" y="332" font-size="12" font-weight="600" fill="#4338ca">쿠버네티스 (설계)</text>
  <text x="56" y="352" font-size="11" fill="#312e81">kubeconfig · 리소스 (미구현)</text>

  <!-- type caps -->
  <text x="356" y="103" font-size="11.5" font-weight="700" fill="#0f766e">Package</text>
  <text x="356" y="183" font-size="11.5" font-weight="700" fill="#0e7490">Container</text>
  <text x="356" y="263" font-size="11.5" font-weight="700" fill="#15803d">Binary</text>
  <text x="356" y="343" font-size="11.5" font-weight="700" fill="#4338ca">K8s</text>

  <!-- raw model -->
  <rect x="500" y="180" width="180" height="92" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.6"/>
  <text x="590" y="210" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">raw Software</text>
  <text x="590" y="230" text-anchor="middle" font-size="10.5" fill="#475569">DEB / RPM / Docker</text>
  <text x="590" y="246" text-anchor="middle" font-size="10.5" fill="#475569">Podman / Legacy</text>

  <path d="M448,98 L498,210" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#cl)"/>
  <path d="M448,178 L498,220" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#cl)"/>
  <path d="M448,258 L498,232" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#cl)"/>
  <path d="M448,338 L498,244" fill="none" stroke="#64748b" stroke-width="1.1" stroke-dasharray="4,4" marker-end="url(#cl)"/>

  <!-- refine -->
  <rect x="730" y="120" width="210" height="62" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
  <text x="835" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400e">honeybee 서버 · 정제</text>
  <text x="835" y="165" text-anchor="middle" font-size="11" fill="#b45309">raw → smdl 매핑</text>

  <!-- smdl -->
  <rect x="730" y="220" width="210" height="92" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.8"/>
  <text x="835" y="248" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">SoftwareList (smdl)</text>
  <text x="835" y="268" text-anchor="middle" font-size="10.5" fill="#047857">Package / Container /</text>
  <text x="835" y="284" text-anchor="middle" font-size="10.5" fill="#047857">Kubernetes / Binary</text>

  <path d="M680,210 L728,165" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#cl)"/>
  <path d="M835,182 L835,218" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#cl)"/>
  <path d="M835,312 L835,348" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#cl)"/>
  <text x="835" y="366" text-anchor="middle" font-size="11" fill="#334155">→ damselfly / cicada → grasshopper</text>
</svg>
