<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ct" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#0891b2"/>
    </marker>
    <marker id="ctg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="560" fill="#ffffff"/>

  <!-- step 1 image -->
  <rect x="120" y="22" width="580" height="80" rx="9" fill="#cffafe" stroke="#0e7490" stroke-width="1.8"/>
  <text x="410" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#0e7490">① 이미지 확보</text>
  <text x="410" y="68" text-anchor="middle" font-size="11.5" fill="#0c4a6e">타깃 registry pull → (실패) 소스 save · 청크 전송 · 타깃 load</text>
  <text x="410" y="86" text-anchor="middle" font-size="11.5" fill="#0c4a6e">→ (save 실패) commit 으로 스냅샷 후 save · load → tag</text>

  <rect x="120" y="120" width="580" height="44" rx="9" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="410" y="147" text-anchor="middle" font-size="12.5" fill="#0c4a6e">② 리스닝 포트 검증</text>

  <rect x="120" y="180" width="580" height="44" rx="9" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="410" y="207" text-anchor="middle" font-size="12.5" fill="#0c4a6e">③ 구성 복사 (compose 파일 · 볼륨 · 마운트 호스트 경로)</text>

  <rect x="120" y="240" width="580" height="44" rx="9" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="410" y="267" text-anchor="middle" font-size="12.5" fill="#0c4a6e">④ 네트워크 생성 (비-bridge 네트워크 사용 시)</text>

  <!-- step 5 branch -->
  <rect x="120" y="300" width="580" height="44" rx="9" fill="#cffafe" stroke="#0e7490" stroke-width="1.8"/>
  <text x="410" y="327" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0e7490">⑤ 기동 (구성에 따라 분기)</text>

  <rect x="120" y="376" width="280" height="64" rx="9" fill="#f0f9ff" stroke="#0891b2" stroke-width="1.4"/>
  <text x="260" y="401" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">compose 있음</text>
  <text x="260" y="421" text-anchor="middle" font-size="11.5" fill="#0c4a6e">docker compose / podman-compose up -d</text>

  <rect x="420" y="376" width="280" height="64" rx="9" fill="#f0f9ff" stroke="#0891b2" stroke-width="1.4"/>
  <text x="560" y="401" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">compose 없음</text>
  <text x="560" y="421" text-anchor="middle" font-size="11.5" fill="#0c4a6e">run -d (-p · -v · -e · --network · --restart)</text>

  <rect x="120" y="476" width="580" height="42" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="410" y="502" text-anchor="middle" font-size="12" fill="#334155">상태: finished</text>

  <path d="M410,102 L410,120" stroke="#0891b2" stroke-width="1.5" marker-end="url(#ct)"/>
  <path d="M410,164 L410,180" stroke="#0891b2" stroke-width="1.5" marker-end="url(#ct)"/>
  <path d="M410,224 L410,240" stroke="#0891b2" stroke-width="1.5" marker-end="url(#ct)"/>
  <path d="M410,284 L410,300" stroke="#0891b2" stroke-width="1.5" marker-end="url(#ct)"/>
  <path d="M340,344 L260,374" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#ctg)"/>
  <path d="M480,344 L560,374" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#ctg)"/>
  <path d="M260,440 L400,474" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#ctg)"/>
  <path d="M560,440 L420,474" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#ctg)"/>
</svg>
