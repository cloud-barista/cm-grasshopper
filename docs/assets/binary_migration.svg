<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 680" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#16a34a"/>
    </marker>
    <marker id="a2g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="680" fill="#ffffff"/>

  <!-- top band: collect -> refine -> execute -->
  <rect x="40" y="18" width="270" height="56" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="175" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">honeybee · 수집</text>
  <text x="175" y="59" text-anchor="middle" font-size="11" fill="#b45309">기동 방식 · 버전 · 비패키지 deps</text>

  <rect x="355" y="18" width="270" height="56" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="490" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">server · 정제</text>
  <text x="490" y="59" text-anchor="middle" font-size="11" fill="#1d4ed8">BinaryPath=catalina.home · deps 매핑</text>

  <rect x="670" y="18" width="270" height="56" rx="9" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="805" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">grasshopper · 실행</text>
  <text x="805" y="59" text-anchor="middle" font-size="11" fill="#047857">아래 단계 수행</text>

  <path d="M310,46 L353,46" stroke="#64748b" stroke-width="1.5" marker-end="url(#a2g)"/>
  <path d="M625,46 L668,46" stroke="#64748b" stroke-width="1.5" marker-end="url(#a2g)"/>
  <polyline points="805,74 805,92 300,92 300,106" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#a2g)"/>

  <!-- vertical steps -->
  <g>
    <rect x="120" y="108" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
    <text x="300" y="135" text-anchor="middle" font-size="12.5" fill="#14532d">① 의존성 복사 (비패키지 deps)</text>

    <rect x="120" y="164" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
    <text x="300" y="191" text-anchor="middle" font-size="12.5" fill="#14532d">② 바이너리 경로 복사 (심링크 안전)</text>

    <rect x="120" y="220" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
    <text x="300" y="247" text-anchor="middle" font-size="12.5" fill="#14532d">③ 설정 · 데이터 복사</text>

    <rect x="120" y="276" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
    <text x="300" y="303" text-anchor="middle" font-size="12.5" fill="#14532d">④ 사용자 · 그룹 재생성 (UID/GID 보존)</text>

    <rect x="120" y="332" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
    <text x="300" y="359" text-anchor="middle" font-size="12.5" fill="#14532d">⑤ 환경변수 적용 (/etc/environment)</text>

    <rect x="120" y="388" width="360" height="48" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.8"/>
    <text x="300" y="417" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">⑥ 기동 메커니즘 재현 (분기)</text>

    <path d="M300,152 L300,164" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a2)"/>
    <path d="M300,208 L300,220" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a2)"/>
    <path d="M300,264 L300,276" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a2)"/>
    <path d="M300,320 L300,332" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a2)"/>
    <path d="M300,376 L300,388" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a2)"/>
  </g>

  <!-- branch boxes -->
  <rect x="560" y="358" width="380" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
  <text x="576" y="383" font-size="12" fill="#3730a3">systemd 관리 → 원본 unit 파일 복사</text>

  <rect x="560" y="406" width="380" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
  <text x="576" y="431" font-size="12" fill="#3730a3">명령어 실행 → unit 합성 (Type 판별 · nginx 보정)</text>

  <rect x="560" y="454" width="380" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.4"/>
  <text x="576" y="479" font-size="12" fill="#3730a3">Wine → 런타임 설치 + WINEPREFIX 주입</text>

  <path d="M480,406 L558,378" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#a2g)"/>
  <path d="M480,414 L558,426" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#a2g)"/>
  <path d="M480,424 L558,474" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#a2g)"/>

  <!-- step 7 -->
  <rect x="120" y="520" width="820" height="46" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
  <text x="530" y="548" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">⑦ 서비스 start + is-active 검증</text>

  <path d="M300,436 L300,518" fill="none" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a2)"/>

  <!-- note -->
  <rect x="120" y="592" width="820" height="60" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.4"/>
  <text x="140" y="616" font-size="12" fill="#9a3412" font-weight="600">※ 패키지 소유 SW 분리</text>
  <text x="140" y="637" font-size="11.5" fill="#9a3412">apt/dnf로 설치된 리스닝 서비스(nginx·mysql 등)는 honeybee 수집 단계에서 Legacy 대상에서 제외되어 Package 경로로 처리됩니다.</text>
</svg>
