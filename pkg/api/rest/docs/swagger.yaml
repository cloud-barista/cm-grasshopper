info:
  contact: {}
  description: Software migration management module
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: CM-Grasshopper REST API
  version: latest
paths:
  /job/log/{jobId}:
    get:
      consumes:
      - application/json
      description: Get k8s migration job log by job ID.
      operationId: get-job-log
      parameters:
      - description: ID of the job.
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully got the job log.
          schema:
            $ref: '#/definitions/github_com_cloud-barista_cm-grasshopper_pkg_api_rest_model.JobLogRes'
        "400":
          description: Sent bad request.
          schema:
            $ref: '#/definitions/github_com_cloud-barista_cm-grasshopper_pkg_api_rest_common.ErrorResponse'
        "500":
          description: Failed to get the job log.
          schema:
            $ref: '#/definitions/github_com_cloud-barista_cm-grasshopper_pkg_api_rest_common.ErrorResponse'
      summary: Get Job Log
      tags:
      - '[Migration] K8s migration job APIs'
  /job/status:
    get:
      consumes:
      - application/json
      description: List k8s migration jobs.
      operationId: list-job-status
      parameters:
      - description: Page number.
        in: query
